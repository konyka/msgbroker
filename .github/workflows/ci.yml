name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            build_type: Debug
          - os: ubuntu-latest
            cc: gcc
            build_type: Release
          - os: ubuntu-latest
            cc: clang
            build_type: Debug
          - os: ubuntu-latest
            cc: clang
            build_type: Release
          - os: macos-latest
            cc: clang
            build_type: Debug
          - os: macos-latest
            cc: clang
            build_type: Release
          - os: windows-latest
            cc: cl
            build_type: Debug
          - os: windows-latest
            cc: cl
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y liburing-dev

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DMB_BUILD_EXAMPLES=OFF
          -DMB_BUILD_PERF=OFF
        shell: bash

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --timeout 60
